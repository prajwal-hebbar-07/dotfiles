# Prefix
unbind C-b
set -g prefix C-s
bind C-s send-prefix

# Terminal behavior
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -as terminal-features ",wezterm:RGB"
set -g escape-time 10
set -g focus-events on
set -g mouse on
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1

# Window and pane actions
bind c new-window -c "#{pane_current_path}"
bind r command-prompt -I "#W" "rename-window '%%'"
bind x confirm-before -p "Close pane #P? (y/n)" kill-pane

# Vim-style pane movement
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Vim-style pane resizing
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

# Splits open in the current pane's directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Clipboard and copy mode
set -s set-clipboard external
setw -g mode-keys vi
bind [ copy-mode
bind ] paste-buffer
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# Catppuccin Mocha-inspired palette
set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=#181825,fg=#cdd6f4"
set -g status-left-length 40
set -g status-right-length 100
set -g status-left "#[bg=#cba6f7,fg=#1e1e2e,bold] #S #[bg=#181825,fg=#cba6f7] "
set -g status-right "#[fg=#6c7086]#{pane_current_path} #[fg=#89b4fa]%H:%M #[fg=#a6e3a1]%d %b"

setw -g window-status-separator ""
setw -g window-status-format "#[bg=#181825,fg=#6c7086] #I:#W "
setw -g window-status-current-format "#[bg=#313244,fg=#89b4fa,bold] #I:#W "

set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#cba6f7"
set -g message-style "bg=#313244,fg=#cdd6f4"
set -g mode-style "bg=#89b4fa,fg=#1e1e2e,bold"
set -g clock-mode-colour "#89b4fa"
