# Prefix
unbind C-b
set -g prefix C-s
bind C-s send-prefix

# Terminal behavior
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -as terminal-features ",wezterm:RGB"
set -g escape-time 10
set -g focus-events on
set -g mouse on
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1

# Window and pane actions
bind c new-window -c "#{session_path}"
bind , command-prompt "rename-window '%%'"
bind r command-prompt "rename-window '%%'"
bind x confirm-before -p "Close pane #P? (y/n)" kill-pane
bind m resize-pane -Z
bind g display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "lazygit"
bind G display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "hunk diff"
bind y display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "yazi"
bind t display-popup -d "#{pane_current_path}" -w 80% -h 80% -E "tree -L 3 -a -I '.git|node_modules|.venv|__pycache__' --charset X | less -R"
bind s display-popup -w 55% -h 65% -E 'session="$(sesh list -t -c | gum filter --height 20 --placeholder "Pick session")"; [ -n "$session" ] && sesh connect "$session"'

# Vim-style pane movement
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# Vim-style pane resizing
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

# Splits open in the current pane's directory
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind -q |
unbind -q '"'
unbind -q %

# Clipboard and copy mode
set -s set-clipboard external
setw -g mode-keys vi
bind [ copy-mode
bind v copy-mode
bind ] paste-buffer
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# Catppuccin Mocha status bar
set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-justify absolute-centre
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left-length 56
set -g status-right-length 56
set -g status-left "#[bg=#cba6f7,fg=#11111b,bold] #S #[bg=#313244,fg=#cdd6f4] #{b:pane_current_path} #[bg=#f5c2e7,fg=#11111b,bold] #(p=#{q:pane_current_path}; while [ \"\$p\" != / ]; do if [ -f \"\$p/package.json\" ] || [ -f \"\$p/pnpm-lock.yaml\" ] || [ -f \"\$p/yarn.lock\" ] || [ -f \"\$p/package-lock.json\" ]; then printf JS; exit; fi; if [ -f \"\$p/pyproject.toml\" ] || [ -f \"\$p/requirements.txt\" ] || [ -f \"\$p/setup.py\" ] || [ -f \"\$p/Pipfile\" ]; then printf PY; exit; fi; if [ -d \"\$p/.git\" ]; then printf GIT; exit; fi; p=$(dirname \"\$p\"); done; printf DIR) "
set -g status-right "#{?window_zoomed_flag,#[bg=#f9e2af,fg=#11111b,bold] ZOOM ,}#[bg=#313244,fg=#cdd6f4] pane #P #[bg=#89b4fa,fg=#11111b,bold] %H:%M #[bg=#a6e3a1,fg=#11111b] %d %b "

setw -g window-status-separator " "
setw -g window-status-format "#[bg=#313244,fg=#a6adc8] #I:#W "
setw -g window-status-current-format "#[bg=#89b4fa,fg=#11111b,bold] #I:#W#{?window_zoomed_flag,*,} "
setw -g window-status-activity-style "bg=#f9e2af,fg=#11111b,bold"

set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#cba6f7"
set -g message-style "bg=#313244,fg=#cdd6f4,fill=#1e1e2e"
set -g message-command-style "bg=#313244,fg=#cdd6f4,fill=#1e1e2e"
set -g mode-style "bg=#89b4fa,fg=#1e1e2e,bold"
set -g clock-mode-colour "#89b4fa"
