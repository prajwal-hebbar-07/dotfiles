# Prefix
unbind C-b
set -g prefix C-s
bind C-s send-prefix

# Terminal behavior
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -as terminal-features ",wezterm:RGB"
set -g escape-time 10
set -g focus-events on
set -g mouse on
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1

# Window and pane actions
bind c new-window -c "#{session_path}"
bind , command-prompt "rename-window '%%'"
bind r command-prompt "rename-window '%%'"
bind x confirm-before -p "Close pane #P? (y/n)" kill-pane
bind m resize-pane -Z
bind g display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "lazygit"
bind G display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "hunk diff"
bind y display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "yazi"
bind t display-popup -d "#{pane_current_path}" -w 80% -h 80% -E "tree -L 3 -a -I '.git|node_modules|.venv|__pycache__' --charset X | less -R"
bind s display-popup -w 55% -h 65% -E 'session="$(sesh list -t -c | gum filter --height 20 --placeholder "Pick session")"; [ -n "$session" ] && sesh connect "$session"'

# Vim-style pane movement (prefix h/j/k/l).
# Ctrl+h/j/k/l are intentionally left unbound so they pass through to Neovim
# for window navigation.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style pane resizing
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

# Splits open in the current pane's directory
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind -q |
unbind -q '"'
unbind -q %

# Clipboard and copy mode
set -s set-clipboard external
setw -g mode-keys vi
bind [ copy-mode
bind v copy-mode
bind ] paste-buffer
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# Tokyo Night status bar
# Two rows: a blank spacer on top separates the bar from the nvim pane above,
# the real bar (default assembler template, fed by our status-left/right/window
# settings below) sits on the bottom row.
set -g status 2
set -g status-position bottom
set -g status-format[0] ""
set -g status-format[1] "#[align=left range=left #{E:status-left-style}]#[push-default]#{T;=/#{status-left-length}:status-left}#[pop-default]#[norange default]#[list=on align=#{status-justify}]#[list=left-marker]<#[list=right-marker]>#[list=on]#{W:#[range=window|#{window_index} #{E:window-status-style}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-format}#[pop-default]#[norange default]#{?loop_last_flag,,#{E:window-status-separator}},#[range=window|#{window_index} list=focus #{?#{!=:#{E:window-status-current-style},default},#{E:window-status-current-style},#{E:window-status-style}}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-current-format}#[pop-default]#[norange list=on default]#{?loop_last_flag,,#{E:window-status-separator}}}#[nolist align=right range=right #{E:status-right-style}]#[push-default]#{T;=/#{status-right-length}:status-right}#[pop-default]#[norange default]"
set -g status-interval 5
set -g status-justify absolute-centre
set -g status-style "bg=default,fg=#c0caf5"
set -g status-left-length 56
set -g status-right-length 56
set -g status-left "#[bg=#7aa2f7,fg=#1a1b26,bold] #S #[bg=#292e42,fg=#c0caf5] #{b:pane_current_path} #[bg=#bb9af7,fg=#1a1b26,bold] #(p=#{q:pane_current_path}; while [ \"\$p\" != / ]; do if [ -f \"\$p/package.json\" ] || [ -f \"\$p/pnpm-lock.yaml\" ] || [ -f \"\$p/yarn.lock\" ] || [ -f \"\$p/package-lock.json\" ]; then printf JS; exit; fi; if [ -f \"\$p/pyproject.toml\" ] || [ -f \"\$p/requirements.txt\" ] || [ -f \"\$p/setup.py\" ] || [ -f \"\$p/Pipfile\" ]; then printf PY; exit; fi; if [ -d \"\$p/.git\" ]; then printf GIT; exit; fi; p=$(dirname \"\$p\"); done; printf DIR) "
set -g status-right "#{?window_zoomed_flag,#[bg=#e0af68,fg=#1a1b26,bold] ZOOM ,}#[bg=#292e42,fg=#c0caf5] pane #P #[bg=#7aa2f7,fg=#1a1b26,bold] %H:%M #[bg=#9ece6a,fg=#1a1b26] %d %b "

setw -g window-status-separator " "
setw -g window-status-format "#[bg=#292e42,fg=#a9b1d6] #I:#W "
setw -g window-status-current-format "#[bg=#7aa2f7,fg=#1a1b26,bold] #I:#W#{?window_zoomed_flag,*,} "
setw -g window-status-activity-style "bg=#e0af68,fg=#1a1b26,bold"

set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"
set -g message-style "bg=#292e42,fg=#c0caf5,fill=#1a1b26"
set -g message-command-style "bg=#292e42,fg=#c0caf5,fill=#1a1b26"
set -g mode-style "bg=#7aa2f7,fg=#1a1b26,bold"
set -g clock-mode-colour "#7aa2f7"
