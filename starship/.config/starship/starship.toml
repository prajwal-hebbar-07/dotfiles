add_newline = true
command_timeout = 500
palette = "tokyonight"

format = """$directory\
${custom.giturl}\
$git_branch\
${custom.git_worktree}\
$git_status\
$line_break\
$character"""
right_format = """$nodejs$python$package$cmd_duration$jobs$status"""

# Tokyo Night (night) mapped onto the original color-key names, so the
# format/style strings below stay untouched.
[palettes.tokyonight]
rosewater = "#c0caf5"
flamingo = "#ff9e64"
pink = "#bb9af7"
mauve = "#bb9af7"
red = "#f7768e"
maroon = "#f7768e"
peach = "#ff9e64"
yellow = "#e0af68"
green = "#9ece6a"
teal = "#73daca"
sky = "#7dcfff"
sapphire = "#7dcfff"
blue = "#7aa2f7"
lavender = "#9d7cd8"
text = "#c0caf5"
subtext1 = "#a9b1d6"
subtext0 = "#9aa5ce"
overlay2 = "#737aa2"
overlay1 = "#565f89"
overlay0 = "#545c7e"
surface2 = "#3b4261"
surface1 = "#292e42"
surface0 = "#292e42"
base = "#1a1b26"
mantle = "#16161e"
crust = "#15161e"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold mauve)"

[directory]
format = "[ $path ]($style) "
style = "teal"
truncation_length = 4
truncation_symbol = "…/"
read_only = " 󰌾"
read_only_style = "red"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "
"Developer" = "󰲋 "

[git_branch]
format = "[$symbol$branch]($style)[](base) "
style = "fg:lavender bg:base"
symbol = "[](base) "

[git_status]
format = "[$untracked$staged$modified$renamed$deleted$conflicted$ahead_behind]($style) "
style = "bold peach"
conflicted = "[✖${count} ](red bold)"
ahead = "[⇡${count} ](teal)"
behind = "[⇣${count} ](peach)"
diverged = "[⇕⇡${ahead_count}⇣${behind_count} ](mauve)"
up_to_date = ""
untracked = "[?${count} ](red)"
stashed = "[≡${count} ](lavender)"
modified = "[!${count} ](yellow)"
staged = "[+${count} ](green)"
renamed = "[»${count} ](blue)"
deleted = "[-${count} ](red)"

[custom.giturl]
description = "Display symbol for remote Git server"
command = """
GIT_REMOTE=$(command git ls-remote --get-url 2> /dev/null)
case "$GIT_REMOTE" in
    *github*) GIT_REMOTE_SYMBOL="" ;;
    *gitlab*) GIT_REMOTE_SYMBOL="" ;;
    *bitbucket*) GIT_REMOTE_SYMBOL="" ;;
    *git*) GIT_REMOTE_SYMBOL="" ;;
    *) GIT_REMOTE_SYMBOL="" ;;
esac
echo "$GIT_REMOTE_SYMBOL"
"""
when = "git rev-parse --is-inside-work-tree 2> /dev/null"
format = "[$output]($style) "
style = "bold lavender"
require_repo = true
ignore_timeout = true

[custom.git_worktree]
description = "Show indicator when inside a git worktree"
command = """
echo "⛓"
"""
when = """
git rev-parse --git-dir >/dev/null 2>&1 &&
[ "$(git rev-parse --path-format=absolute --git-common-dir 2>/dev/null)" != "$(git rev-parse --path-format=absolute --git-dir 2>/dev/null)" ]
"""
format = "[$output]($style) "
style = "bold green"
require_repo = true
ignore_timeout = true

[nodejs]
format = "[ $symbol$version ]($style) "
style = "bold green"
symbol = " "

[python]
format = "[ $symbol${pyenv_prefix}$version( \\($virtualenv\\)) ]($style) "
style = "bold yellow"
symbol = " "

[package]
format = "[ $symbol$version ]($style) "
style = "bold pink"
symbol = "󰏗 "

[cmd_duration]
format = "[ took $duration ]($style) "
style = "yellow"
min_time = 1000

[jobs]
format = "[ $symbol$number ]($style) "
style = "teal"
symbol = "✦"

[status]
disabled = false
format = "[ exit $status ]($style) "
style = "bold red"

[line_break]
disabled = true
