add_newline = true
command_timeout = 1000
palette = "catppuccin_mocha"

format = """[╭─](overlay0)$directory$git_branch$git_status$nodejs$python$package$cmd_duration$jobs$status
[╰─](overlay0)$character"""

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold mauve)"

[directory]
format = "[ $path ]($style)"
style = "bold blue"
truncation_length = 3
truncation_symbol = "…/"
read_only = " 󰌾"
read_only_style = "red"

[git_branch]
format = "[ $symbol$branch ]($style)"
style = "bold mauve"
symbol = " "

[git_status]
format = "([$all_status$ahead_behind]($style) )"
style = "peach"
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
up_to_date = ""
untracked = "?${count}"
stashed = "*${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[nodejs]
format = "[ $symbol($version) ]($style)"
style = "bold green"
symbol = " "

[python]
format = "[ ${symbol}${pyenv_prefix}(${version})( \\($virtualenv\\)) ]($style)"
style = "bold yellow"
symbol = " "

[package]
format = "[ $symbol$version ]($style)"
style = "bold pink"
symbol = "󰏗 "

[cmd_duration]
format = "[ took $duration ]($style)"
style = "yellow"
min_time = 1000

[jobs]
format = "[ $symbol$number ]($style)"
style = "teal"
symbol = "✦"

[status]
disabled = false
format = "[ exit $status ]($style)"
style = "bold red"

[line_break]
disabled = false
