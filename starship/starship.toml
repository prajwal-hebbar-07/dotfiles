add_newline = false
command_timeout = 500
palette = "catppuccin_mocha"

format = """$directory\
${custom.giturl}\
$git_branch\
${custom.git_worktree}\
$git_status\
$line_break\
$character"""
right_format = """$nodejs$python$package$cmd_duration$jobs$status"""

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold mauve)"

[directory]
format = "[ $path ]($style) "
style = "teal"
truncation_length = 4
truncation_symbol = "…/"
read_only = " 󰌾"
read_only_style = "red"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "
"Developer" = "󰲋 "

[git_branch]
format = "[$symbol$branch ]($style)[](base) "
style = "fg:lavender bg:base"
symbol = "[](base) "

[git_status]
format = "[$untracked$staged$modified$renamed$deleted$conflicted$ahead_behind]($style) "
style = "bold peach"
conflicted = "[✖${count} ](red bold)"
ahead = "[⇡${count} ](teal)"
behind = "[⇣${count} ](peach)"
diverged = "[⇕⇡${ahead_count}⇣${behind_count} ](mauve)"
up_to_date = ""
untracked = "[?${count} ](red)"
stashed = "[≡${count} ](lavender)"
modified = "[!${count} ](yellow)"
staged = "[+${count} ](green)"
renamed = "[»${count} ](blue)"
deleted = "[-${count} ](red)"

[custom.giturl]
description = "Display symbol for remote Git server"
command = """
GIT_REMOTE=$(command git ls-remote --get-url 2> /dev/null)
case "$GIT_REMOTE" in
    *github*) GIT_REMOTE_SYMBOL="" ;;
    *gitlab*) GIT_REMOTE_SYMBOL="" ;;
    *bitbucket*) GIT_REMOTE_SYMBOL="" ;;
    *git*) GIT_REMOTE_SYMBOL="" ;;
    *) GIT_REMOTE_SYMBOL="" ;;
esac
echo "$GIT_REMOTE_SYMBOL"
"""
when = "git rev-parse --is-inside-work-tree 2> /dev/null"
format = "[$output]($style) "
style = "bold lavender"
require_repo = true
ignore_timeout = true

[custom.git_worktree]
description = "Show indicator when inside a git worktree"
command = """
echo "⛓"
"""
when = """
git rev-parse --git-dir >/dev/null 2>&1 &&
[ "$(git rev-parse --path-format=absolute --git-common-dir 2>/dev/null)" != "$(git rev-parse --path-format=absolute --git-dir 2>/dev/null)" ]
"""
format = "[$output]($style) "
style = "bold green"
require_repo = true
ignore_timeout = true

[nodejs]
format = "[ $symbol$version ]($style) "
style = "bold green"
symbol = " "

[python]
format = "[ $symbol${pyenv_prefix}$version( \\($virtualenv\\)) ]($style) "
style = "bold yellow"
symbol = " "

[package]
format = "[ $symbol$version ]($style) "
style = "bold pink"
symbol = "󰏗 "

[cmd_duration]
format = "[ took $duration ]($style) "
style = "yellow"
min_time = 1000

[jobs]
format = "[ $symbol$number ]($style) "
style = "teal"
symbol = "✦"

[status]
disabled = false
format = "[ exit $status ]($style) "
style = "bold red"

[line_break]
disabled = true
