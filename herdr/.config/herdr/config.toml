# Herdr configuration matched to this repo's tmux muscle memory.

onboarding = false

[theme]
name = "catppuccin"

[theme.custom]
accent = "#cba6f7"

[terminal]
shell_mode = "auto"
new_cwd = "follow"

[update]
channel = "stable"

[keys]
prefix = "ctrl+s"

help = "prefix+?"
settings = "prefix+;"
detach = "prefix+d"
reload_config = "prefix+shift+r"

workspace_picker = "prefix+w"
goto = "prefix+s"
new_workspace = "prefix+shift+w"
rename_workspace = "prefix+shift+comma"
close_workspace = "prefix+shift+d"

new_tab = "prefix+c"
rename_tab = "prefix+comma"
previous_tab = "prefix+p"
next_tab = "prefix+n"
switch_tab = "prefix+1..9"
close_tab = "prefix+shift+x"
rename_pane = "prefix+shift+p"

focus_pane_left = "prefix+h"
focus_pane_down = "prefix+j"
focus_pane_up = "prefix+k"
focus_pane_right = "prefix+l"
cycle_pane_next = "prefix+tab"
cycle_pane_previous = "prefix+shift+tab"

split_vertical = "prefix+backslash"
split_horizontal = "prefix+minus"
close_pane = "prefix+x"
zoom = "prefix+m"
resize_mode = "prefix+alt+r"
edit_scrollback = "prefix+e"

navigate_workspace_up = "k"
navigate_workspace_down = "j"
navigate_pane_left = "h"
navigate_pane_down = "ctrl+j"
navigate_pane_up = "ctrl+k"
navigate_pane_right = "l"

[[keys.command]]
key = "prefix+slash"
type = "pane"
command = "~/.config/herdr/bin/herdr-keymaps"
description = "Search Herdr keymaps"

[[keys.command]]
key = "prefix+q"
type = "shell"
command = "herdr server stop"
description = "Stop Herdr server"

[[keys.command]]
key = "prefix+shift+q"
type = "pane"
command = "~/.config/herdr/bin/herdr-reset-session"
description = "Reset Herdr default session"

[[keys.command]]
key = "ctrl+h"
type = "shell"
command = "herdr pane focus --direction left"
description = "Focus pane left"

[[keys.command]]
key = "ctrl+j"
type = "shell"
command = "herdr pane focus --direction down"
description = "Focus pane down"

[[keys.command]]
key = "ctrl+k"
type = "shell"
command = "herdr pane focus --direction up"
description = "Focus pane up"

[[keys.command]]
key = "ctrl+l"
type = "shell"
command = "herdr pane focus --direction right"
description = "Focus pane right"

[[keys.command]]
key = "prefix+shift+h"
type = "shell"
command = "herdr pane resize --direction left --amount 0.05"
description = "Resize pane left"

[[keys.command]]
key = "prefix+shift+j"
type = "shell"
command = "herdr pane resize --direction down --amount 0.05"
description = "Resize pane down"

[[keys.command]]
key = "prefix+shift+k"
type = "shell"
command = "herdr pane resize --direction up --amount 0.05"
description = "Resize pane up"

[[keys.command]]
key = "prefix+shift+l"
type = "shell"
command = "herdr pane resize --direction right --amount 0.05"
description = "Resize pane right"

[[keys.command]]
key = "prefix+g"
type = "pane"
command = "lazygit"
description = "Open lazygit"

[[keys.command]]
key = "prefix+y"
type = "pane"
command = "yazi"
description = "Open yazi"

[[keys.command]]
key = "prefix+t"
type = "pane"
command = "tree -L 3 -a -I '.git|node_modules|.venv|__pycache__' --charset X | less -R"
description = "Show project tree"

[ui]
mouse_capture = true
mouse_scroll_lines = 7
prompt_new_tab_name = false
pane_borders = true
pane_gaps = true
show_agent_labels_on_pane_borders = true

[ui.toast]
delivery = "herdr"

[session]
resume_agents_on_restore = true

[remote]
manage_ssh_config = true
